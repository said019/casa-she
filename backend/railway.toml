[build]
builder = "nixpacks"

[build.nixpacks]
nixpacksVersion = "latest"

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build"]

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
